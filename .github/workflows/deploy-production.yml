name: Deploy to Production (AWS EC2)

on:
  push:
    branches: [prod]          # Only deploy when code reaches the `prod` branch
  workflow_dispatch:           # Allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production    # Ties to GitHub Environment (can add approval gate)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /home/ubuntu/signature-sap

            echo "📦 Pulling latest code from prod..."
            git pull origin prod

            echo "🛑 Stopping containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production down

            echo "🔨 Building new images..."
            docker compose -f docker-compose.prod.yml --env-file .env.production build --no-cache

            echo "🚀 Starting containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d

            echo "🗄️ Running DB migrations..."
            docker exec signatureshades-api-prod npx prisma migrate deploy

            echo "🧹 Cleaning old images..."
            docker image prune -f

            echo "✅ Deployment complete at $(date)"
          EOF

      - name: Health Check
        run: |
          echo "⏳ Waiting for app to start..."
          sleep 15
          curl -f https://orders.signatureshades.com.au/api/health || exit 1
          echo "✅ Health check passed!"

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment SUCCEEDED"
          else
            echo "❌ Production deployment FAILED — check logs above"
          fi
