version: '3.8'

services:
  # Backend API (Production)
  # Database: AWS RDS PostgreSQL in Melbourne (ap-southeast-4)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: signatureshades-api-prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PORT: 5000
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    networks:
      - signatureshades-network

  # Frontend (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: signatureshades-web-prod
    restart: always
    networks:
      - signatureshades-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: signatureshades-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-production.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - signatureshades-network

networks:
  signatureshades-network:
    driver: bridge
